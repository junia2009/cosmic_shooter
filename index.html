<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Shooter 3D</title>
  <style>
    /* === ベース === */
    body {
      margin: 0;
      overflow: hidden;
      background: #05081a;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      touch-action: manipulation;
    }

    /* === HUD === */
    #score {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: 2em;
      text-shadow: 0 0 10px #0ff, 0 0 20px #00f;
      z-index: 10;
    }
    #timer {
      position: absolute;
      top: 20px;
      right: 40px;
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: 2em;
      text-shadow: 0 0 10px #ff0, 0 0 20px #f80;
      z-index: 11;
    }

    /* === ゲームオーバー === */
    #gameover {
      display: none;
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 2.5em;
      background: rgba(0, 0, 0, 0.7);
      padding: 30px 50px;
      border-radius: 20px;
      text-align: center;
      z-index: 20;
    }
    #restartBtn {
      display: none;
      position: absolute;
      top: 75%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.5em;
      padding: 15px 40px;
      background: #0ff;
      color: #111;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      z-index: 21;
    }

    /* === スタート画面 === */
    #startScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100dvh;
      background: radial-gradient(ellipse at center, rgba(10, 10, 42, 0.55) 60%, rgba(5, 8, 26, 0.55) 100%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #title3d { width: 420px; height: 180px; }
    .start-title {
      color: #fff;
      font-size: 2.6em;
      font-family: 'Orbitron', monospace;
      text-shadow: 0 0 18px #0ff, 0 0 30px #00f;
      margin-bottom: 30px;
    }
    .version {
      color: #0ff;
      font-size: 1.1em;
      font-family: 'Orbitron', monospace;
      margin-bottom: 10px;
      text-align: center;
      opacity: 0.7;
      letter-spacing: 0.05em;
    }
    .start-warning {
      color: #ff0;
      font-size: 1.3em;
      font-family: 'Orbitron', monospace;
      text-shadow: 0 0 10px #f80, 0 0 20px #ff0;
      margin-bottom: 18px;
    }
    #startBtn {
      font-size: 2em;
      padding: 18px 60px;
      background: #0ff;
      color: #111;
      border: none;
      border-radius: 16px;
      box-shadow: 0 0 18px #0ff;
      cursor: pointer;
    }
    .start-desc {
      margin-top: 40px;
      color: #fff;
      font-size: 1.1em;
      opacity: 0.7;
    }
    .start-flex {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      justify-content: center;
      gap: 38px;
      width: 100vw;
      max-width: 100vw;
      box-sizing: border-box;
      padding: 0 2vw;
    }
    .start-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 320px;
      max-width: 420px;
      height: 100%;
    }
    .howto-play {
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin-top: 0;
      padding: 18px 22px;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 14px;
      min-width: 260px;
      max-width: 340px;
      font-size: 1em;
      line-height: 1.6;
      text-align: left;
      box-shadow: 0 0 8px #0ff6;
      color: #fff;
      border: 1.5px solid #0ff;
      align-self: stretch;
      min-height: 340px;
    }
    .item-bomb { color: #ff0; }
    .item-time { color: #0ff; }
    .howto-note { font-size: 0.95em; color: #aaa; }

    /* === モバイル対応 === */
    @media (max-width: 700px) {
      .start-flex {
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 16px 2vw;
      }
      .start-main { min-width: 0; max-width: 99vw; }
      .start-title { font-size: 1.8em; margin-bottom: 12px; }
      .version { font-size: 0.95em; margin-bottom: 4px; }
      .start-warning { font-size: 1em; margin-bottom: 10px; }
      #startBtn { font-size: 1.5em; padding: 12px 40px; }
      .start-desc { margin-top: 16px; font-size: 0.95em; }
      .howto-play {
        margin-top: 8px;
        padding: 12px 12px;
        border-radius: 8px;
        min-width: 0;
        max-width: 94vw;
        min-height: auto;
        font-size: 0.92em;
        line-height: 1.5;
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <audio id="startBgm" src="audio/space_pop.mp3" loop preload="auto"></audio>
  <audio id="playBgm" src="audio/cyber_attack.mp3" loop preload="auto"></audio>

  <div id="startScreen">
    <div class="start-flex">
      <div class="start-main">
        <div id="title3d"></div>
        <div class="start-title">COSMIC SHOOTER</div>
        <div class="version">Ver.1.3.0</div>
        <div class="start-warning">横画面でプレイしてください</div>
        <button id="startBtn">START</button>
        <div class="start-desc">画面タップ/クリックで移動・ショット</div>
      </div>
      <div class="howto-play">
        <b>【遊び方】</b><br>
        ・マウス・タッチ操作で自機を移動<br>
        ・クリック・タップ操作でショット<br>
        ・敵を倒してスコアを稼ごう！<br>
        ・アイテムを取ると効果発動：<br>
        　　<span class="item-bomb">●</span> 敵壊滅弾：画面内の敵を一掃
        　<span class="item-time">●</span> 時間プラス：残り時間+10秒<br>
        ・スコアに応じてランクが決まるよ！<br>
        <span class="howto-note">※スマホは横画面推奨</span>
      </div>
    </div>
  </div>

  <div id="score">0</div>
  <div id="timer">60</div>
  <div id="gameover">GAME OVER</div>
  <button id="restartBtn">リスタート</button>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.153.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

  // =========================================================
  //  定数
  // =========================================================
  const ITEM_TYPE    = { BOMB: 0, TIME: 1 };
  const STAGE_X      = 10;
  const STAGE_Y_MIN  = 0.6;
  const STAGE_Y_MAX  = 8;
  const TIME_LIMIT   = 60;
  const TIME_MAX     = 99;
  const EXPLOSION_COLORS = [0xfff200, 0xff6600, 0xff2222, 0xffffff];
  const STAR_COLORS      = [0xffffff, 0xaaddff, 0xffd0a0, 0xaaffdd];
  const NEBULA_COLORS    = [0x110033, 0x002244, 0x001122, 0x220022];

  // 敵タイプ定義: [hitDist, playerDist, score, speed]
  const ENEMY_DEFS = [
    { hitDist: 1.25, playerDist: 1.3,  score: 100, speed: 7.25 },
    { hitDist: 1.45, playerDist: 1.45, score: 150, speed: 5.5  },
    { hitDist: 1.55, playerDist: 1.55, score: 200, speed: 6.2  },
    { hitDist: 0.95, playerDist: 0.95, score: 80,  speed: 11.5 },
  ];

  // =========================================================
  //  ゲーム状態
  // =========================================================
  let scene, camera, renderer, composer;
  let player, bullets = [], enemies = [], items = [];
  let explosions = [], shockwaves = [];
  let score = 0, isGameOver = false, gameStarted = false;
  let gameTimeLeft = TIME_LIMIT;
  let playerTargetX = 0, playerTargetY = 1.5;
  let width = window.innerWidth, height = window.innerHeight;
  let timerIntervalId = null, itemIntervalId = null, enemyIntervalId = null;
  let showResultAfterExplosion = false;

  // スタート画面用
  let startScene, startCamera, startRenderer, startLogo;
  let startStars = [], startEnemies = [], startAnimId;

  // =========================================================
  //  共通ヘルパー
  // =========================================================
  function clamp(val, min, max) {
    return Math.max(min, Math.min(max, val));
  }

  function calculateRank(s) {
    if (s >= 10000) return 'S';
    if (s >= 8000)  return 'A';
    if (s >= 5000)  return 'B';
    if (s >= 3000)  return 'C';
    return 'D';
  }

  function showResult(title) {
    var rank = calculateRank(score);
    document.getElementById('gameover').innerHTML =
      '<div style="font-size:1.1em;margin-bottom:10px;">' + title + '</div>' +
      '<div style="font-size:2.2em;color:#ff0;text-shadow:0 0 18px #f80,0 0 30px #ff0;">Score: ' + score + '</div>' +
      '<div style="font-size:2em;margin-top:10px;color:#0ff;text-shadow:0 0 10px #0ff;">RANK: ' + rank + '</div>';
    document.getElementById('gameover').style.display = 'block';
    document.getElementById('restartBtn').style.display = 'block';
  }

  function getViewportHeight() {
    return window.visualViewport ? window.visualViewport.height : window.innerHeight;
  }

  function clearAllIntervals() {
    if (timerIntervalId)  { clearInterval(timerIntervalId);  timerIntervalId = null; }
    if (itemIntervalId)   { clearInterval(itemIntervalId);   itemIntervalId = null; }
    if (enemyIntervalId)  { clearInterval(enemyIntervalId);  enemyIntervalId = null; }
  }

  // =========================================================
  //  3Dモデル生成
  // =========================================================

  /** 自機モデル（スタート画面・ゲーム本体で共用） */
  function createPlayerModel() {
    var group = new THREE.Group();

    group.add(makeMesh(
      new THREE.BoxGeometry(1.3, 0.9, 2.1),
      { color: 0xff3333, metalness: 0.7, roughness: 0.15 }
    ));

    var bodySub = makeMesh(
      new THREE.BoxGeometry(0.9, 0.7, 1.2),
      { color: 0xffd700, metalness: 0.7, roughness: 0.18 }
    );
    bodySub.position.z = 1.2;
    group.add(bodySub);

    var cockpit = makeMesh(
      new THREE.SphereGeometry(0.38, 18, 18),
      { color: 0x00bfff, metalness: 0.5, roughness: 0.1, transparent: true, opacity: 0.7, emissive: 0x00eaff }
    );
    cockpit.position.set(0, 0, 1.5);
    group.add(cockpit);

    var wingL = makeMesh(
      new THREE.BoxGeometry(0.22, 1.2, 0.55),
      { color: 0xffffff, metalness: 0.8, roughness: 0.13 }
    );
    wingL.position.set(-0.75, 0, 0);
    wingL.rotation.z = Math.PI / 10;
    group.add(wingL);

    var wingR = wingL.clone();
    wingR.position.x *= -1;
    wingR.rotation.z *= -1;
    group.add(wingR);

    var engine = makeMesh(
      new THREE.CylinderGeometry(0.22, 0.22, 0.55, 14),
      { color: 0x3399ff, metalness: 0.8, roughness: 0.12, emissive: 0x0033ff }
    );
    engine.position.set(0, 0, -1.2);
    engine.rotation.x = Math.PI / 2;
    group.add(engine);

    var deco1 = makeMesh(
      new THREE.BoxGeometry(0.25, 0.25, 0.25),
      { color: 0xffff00, metalness: 0.7, roughness: 0.18 }
    );
    deco1.position.set(-0.5, 0.38, 0);
    group.add(deco1);

    var deco2 = makeMesh(
      new THREE.BoxGeometry(0.25, 0.25, 0.25),
      { color: 0x00ff99, metalness: 0.7, roughness: 0.18 }
    );
    deco2.position.set(0.5, 0.38, 0);
    group.add(deco2);

    return group;
  }

  /** MeshStandardMaterial のショートカット */
  function makeMesh(geometry, matOpts) {
    return new THREE.Mesh(geometry, new THREE.MeshStandardMaterial(matOpts));
  }

  /** 影円 */
  function createShadow(radius, yPos) {
    var shadow = new THREE.Mesh(
      new THREE.CircleGeometry(radius, 16),
      new THREE.MeshBasicMaterial({ color: 0x000000, opacity: 0.2, transparent: true })
    );
    shadow.rotation.x = -Math.PI / 2;
    shadow.position.y = yPos;
    return shadow;
  }

  // =========================================================
  //  爆発・シュックウェーブ生成
  // =========================================================
  function createExplosion(position, particleCount, isPlayer) {
    var particles = [];
    var group = new THREE.Group();

    for (var p = 0; p < particleCount; p++) {
      var mesh = new THREE.Mesh(
        new THREE.SphereGeometry(Math.random() * 0.13 + 0.09, 8, 8),
        new THREE.MeshStandardMaterial({
          color: EXPLOSION_COLORS[Math.floor(Math.random() * EXPLOSION_COLORS.length)],
          emissive: 0xffa500,
          emissiveIntensity: 0.7,
          transparent: true,
          opacity: 0.85,
        })
      );
      mesh.position.copy(position);
      mesh.userData = {
        velocity: new THREE.Vector3(
          (Math.random() - 0.5) * 2.7,
          (Math.random() - 0.5) * 2.7,
          (Math.random() - 0.5) * 2.7
        ),
      };
      group.add(mesh);
      particles.push(mesh);
    }

    scene.add(group);
    explosions.push({
      group: group,
      particles: particles,
      time: 0,
      maxTime: isPlayer ? 1.2 : 0.55,
      isPlayerExplosion: !!isPlayer,
    });
  }

  function createShockwave(position) {
    var ring = new THREE.Mesh(
      new THREE.RingGeometry(0.05, 0.4, 24),
      new THREE.MeshBasicMaterial({ color: 0xffaa22, transparent: true, opacity: 0.88, side: THREE.DoubleSide })
    );
    ring.position.copy(position);
    scene.add(ring);
    shockwaves.push({ mesh: ring, time: 0 });
  }

  // =========================================================
  //  スタート画面
  // =========================================================
  function resizeStartScreen() {
    if (!startRenderer || !startCamera) return;
    var sw = window.innerWidth;
    var sh = getViewportHeight();
    startRenderer.setSize(sw, sh);
    startCamera.aspect = sw / sh;
    startCamera.updateProjectionMatrix();
  }

  function animateStart() {
    startAnimId = requestAnimationFrame(animateStart);
    var now = performance.now();

    if (startLogo) {
      startLogo.rotation.y += 0.025;
      startLogo.rotation.x += 0.01;
      startLogo.position.x = Math.sin(now * 0.0007) * 6;
      startLogo.position.y = Math.cos(now * 0.0005) * 2.5;
    }

    for (var i = 0; i < startStars.length; i++) {
      startStars[i].position.z += 0.22;
      if (startStars[i].position.z > 10) startStars[i].position.z = -40;
    }

    for (var j = 0; j < startEnemies.length; j++) {
      var e = startEnemies[j];
      e.obj.rotation.y += e.type === 2 ? 0.07 : 0.025;
      e.obj.position.x += Math.sin(now * 0.0005 + e.rot) * e.speed;
      e.obj.position.y += Math.cos(now * 0.0007 + e.rot) * e.speed * 0.7;
      if (e.obj.position.x > 10)  e.obj.position.x = -10;
      if (e.obj.position.x < -10) e.obj.position.x = 10;
      if (e.obj.position.y > 8)   e.obj.position.y = STAGE_Y_MIN;
      if (e.obj.position.y < STAGE_Y_MIN) e.obj.position.y = 8;
    }

    if (startRenderer && startScene && startCamera) {
      startRenderer.render(startScene, startCamera);
    }
  }

  function createStartEnemy(type) {
    var enemy = new THREE.Group();
    var scale = 1;

    if (type === 0) {
      enemy.add(makeMesh(new THREE.SphereGeometry(0.6, 20, 20),
        { color: 0x2222ff, metalness: 0.8, roughness: 0.13, emissive: 0x3366ff, emissiveIntensity: 0.5 }));
    } else if (type === 1) {
      scale = 1.2;
      enemy.add(makeMesh(new THREE.CylinderGeometry(0.22, 0.22, 2.2, 16),
        { color: 0x00ffcc, metalness: 0.7, roughness: 0.18, emissive: 0x00ffff, emissiveIntensity: 0.7 }));
    } else if (type === 2) {
      scale = 1.1;
      enemy.add(makeMesh(new THREE.CylinderGeometry(0.7, 0.7, 0.18, 24),
        { color: 0xff8800, metalness: 0.8, roughness: 0.13, emissive: 0xffff00, emissiveIntensity: 0.7 }));
    } else {
      scale = 0.6;
      enemy.add(makeMesh(new THREE.SphereGeometry(0.32, 14, 14),
        { color: 0xff44cc, metalness: 0.7, roughness: 0.18, emissive: 0xffffff, emissiveIntensity: 0.7 }));
    }

    enemy.scale.setScalar(scale);
    return enemy;
  }

  function showStartScreen() {
    var startBgm = document.getElementById('startBgm');
    if (startBgm) { startBgm.currentTime = 0; startBgm.volume = 0.7; }

    var startScreenEl = document.getElementById('startScreen');
    if (startScreenEl) {
      startScreenEl.addEventListener('pointerdown', function () {
        if (startBgm) startBgm.play().catch(function () {});
      }, { once: true });
    }

    startScene = new THREE.Scene();
    var sw = window.innerWidth, sh = window.innerHeight;
    startCamera = new THREE.PerspectiveCamera(60, sw / sh, 0.1, 100);
    startCamera.position.set(0, 0, 14);

    startRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    startRenderer.setSize(sw, sh);
    startRenderer.domElement.style.position = 'fixed';
    startRenderer.domElement.style.top = '0';
    startRenderer.domElement.style.left = '0';
    startRenderer.domElement.style.zIndex = '99';
    startRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(startRenderer.domElement);

    // 自機ロゴ
    startLogo = createPlayerModel();
    startScene.add(startLogo);

    // 敵配置
    startEnemies = [];
    for (var i = 0; i < 12; i++) {
      var t = Math.floor(Math.random() * 4);
      var obj = createStartEnemy(t);
      obj.position.set((Math.random() - 0.5) * 18, (Math.random() - 0.5) * 8, -Math.random() * 18 - 2);
      startScene.add(obj);
      startEnemies.push({ obj: obj, type: t, rot: Math.random() * Math.PI * 2, speed: 0.5 + Math.random() * 1.2 });
    }

    // 星
    startStars = [];
    for (var j = 0; j < 220; j++) {
      var star = new THREE.Mesh(
        new THREE.SphereGeometry(Math.random() * 0.09 + 0.03, 10, 10),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );
      star.position.set((Math.random() - 0.5) * 32, (Math.random() - 0.5) * 18, -Math.random() * 40);
      startScene.add(star);
      startStars.push(star);
    }

    // ライト
    var light = new THREE.PointLight(0x00ffff, 2.2, 60);
    light.position.set(0, 12, 18);
    startScene.add(light);

    window.addEventListener('resize', resizeStartScreen);
    window.addEventListener('orientationchange', resizeStartScreen);
    animateStart();
  }

  function hideStartScreen() {
    document.getElementById('startScreen').style.display = 'none';

    var startBgm = document.getElementById('startBgm');
    if (startBgm) { startBgm.pause(); startBgm.currentTime = 0; }

    if (startAnimId) cancelAnimationFrame(startAnimId);

    if (startScene) {
      for (var i = 0; i < startStars.length; i++) startScene.remove(startStars[i]);
      for (var j = 0; j < startEnemies.length; j++) startScene.remove(startEnemies[j].obj);
    }
    startStars = [];
    startEnemies = [];

    if (startRenderer) {
      startRenderer.dispose();
      if (startRenderer.domElement.parentNode) {
        startRenderer.domElement.parentNode.removeChild(startRenderer.domElement);
      }
    }

    window.removeEventListener('resize', resizeStartScreen);
    window.removeEventListener('orientationchange', resizeStartScreen);
    startLogo = null;
    startScene = null;
    startCamera = null;
    startRenderer = null;
  }

  // =========================================================
  //  ゲーム開始
  // =========================================================
  function startGame() {
    gameStarted = true;
    var playBgm = document.getElementById('playBgm');
    if (playBgm) {
      playBgm.currentTime = 0;
      playBgm.volume = 0.7;
      playBgm.play().catch(function () {});
    }
    init();
    animate();
  }

  // =========================================================
  //  アイテム生成
  // =========================================================
  function addItem() {
    var type = Math.random() < 0.5 ? ITEM_TYPE.BOMB : ITEM_TYPE.TIME;
    var mesh;

    if (type === ITEM_TYPE.BOMB) {
      mesh = new THREE.Group();

      mesh.add(makeMesh(
        new THREE.SphereGeometry(0.32, 18, 18),
        { color: 0xff2222, emissive: 0xffd700, emissiveIntensity: 1.3, transparent: true, opacity: 0.92 }
      ));

      var ring = makeMesh(
        new THREE.TorusGeometry(0.45, 0.09, 16, 32),
        { color: 0xffff00, emissive: 0xfff200, emissiveIntensity: 1.1, transparent: true, opacity: 0.7 }
      );
      ring.rotation.x = Math.PI / 2;
      mesh.add(ring);

      // 五芒星
      var starShape = new THREE.Shape();
      var R = 0.32, r = 0.13;
      for (var i = 0; i < 5; i++) {
        var a = (Math.PI * 2 / 5) * i - Math.PI / 2;
        if (i === 0) starShape.moveTo(Math.cos(a) * R, Math.sin(a) * R);
        else starShape.lineTo(Math.cos(a) * R, Math.sin(a) * R);
        var a2 = a + Math.PI / 5;
        starShape.lineTo(Math.cos(a2) * r, Math.sin(a2) * r);
      }
      var star = new THREE.Mesh(
        new THREE.ShapeGeometry(starShape),
        new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.95, side: THREE.DoubleSide })
      );
      star.position.z = 0.18;
      star.rotation.x = Math.PI / 2;
      mesh.add(star);

      mesh.userData = { type: type, ring: ring, star: star };
    } else {
      mesh = makeMesh(
        new THREE.TorusGeometry(0.38, 0.13, 12, 24),
        { color: 0x33ccff, emissive: 0xffffff, emissiveIntensity: 1.1, transparent: true, opacity: 0.92 }
      );
      var outline = new THREE.Mesh(
        new THREE.TorusGeometry(0.44, 0.18, 12, 24),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.33, side: THREE.BackSide })
      );
      mesh.add(outline);
      mesh.userData = { type: type };
    }

    mesh.position.set(
      (Math.random() - 0.5) * 16,
      Math.random() * 7 + 1,
      -18 - Math.random() * 10
    );
    scene.add(mesh);
    items.push(mesh);
  }

  // =========================================================
  //  敵生成
  // =========================================================
  function addEnemy() {
    var type = Math.floor(Math.random() * 4);
    var def = ENEMY_DEFS[type];
    var enemy = new THREE.Group();
    var y = Math.random() * 7.4 + 0.6;
    var scale = 1;
    var extra = null;

    if (type === 0) {
      // 球体型
      enemy.add(makeMesh(new THREE.SphereGeometry(0.6, 20, 20),
        { color: 0x2222ff, metalness: 0.8, roughness: 0.13, emissive: 0x3366ff, emissiveIntensity: 0.5 }));
      enemy.add(createShadow(0.55, -0.65));

      var glow = makeMesh(new THREE.SphereGeometry(0.28, 14, 14),
        { color: 0xff3366, emissive: 0xff3366, emissiveIntensity: 0.9, transparent: true, opacity: 0.7 });
      glow.position.z = 0.22;
      enemy.add(glow);

      var wingL = makeMesh(new THREE.BoxGeometry(0.15, 0.9, 0.32),
        { color: 0xffffff, metalness: 0.7, roughness: 0.18 });
      wingL.position.set(-0.6, 0, 0);
      wingL.rotation.z = Math.PI / 8;
      enemy.add(wingL);
      var wingR = wingL.clone();
      wingR.position.x *= -1;
      wingR.rotation.z *= -1;
      enemy.add(wingR);

      var thruster = makeMesh(new THREE.CylinderGeometry(0.13, 0.13, 0.32, 12),
        { color: 0xffd700, metalness: 0.8, roughness: 0.18, emissive: 0xffd700 });
      thruster.position.set(0, -0.6, 0);
      thruster.rotation.x = Math.PI / 2;
      enemy.add(thruster);

    } else if (type === 1) {
      // 棒型
      scale = 1.2;
      enemy.add(makeMesh(new THREE.CylinderGeometry(0.22, 0.22, 2.2, 16),
        { color: 0x00ffcc, metalness: 0.7, roughness: 0.18, emissive: 0x00ffff, emissiveIntensity: 0.7 }));
      enemy.add(createShadow(0.32, -1.2));

      var cap1 = makeMesh(new THREE.SphereGeometry(0.28, 12, 12),
        { color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.7, transparent: true, opacity: 0.7 });
      cap1.position.y = 1.1;
      enemy.add(cap1);
      var cap2 = cap1.clone();
      cap2.position.y = -1.1;
      enemy.add(cap2);

    } else if (type === 2) {
      // 円盤型
      scale = 1.1;
      extra = 'spin';
      enemy.add(makeMesh(new THREE.CylinderGeometry(0.7, 0.7, 0.18, 24),
        { color: 0xff8800, metalness: 0.8, roughness: 0.13, emissive: 0xffff00, emissiveIntensity: 0.7 }));
      enemy.add(createShadow(0.55, -0.13));

      var core = makeMesh(new THREE.SphereGeometry(0.22, 14, 14),
        { color: 0xffff00, emissive: 0xffff00, emissiveIntensity: 0.8, transparent: true, opacity: 0.7 });
      core.position.z = 0.1;
      enemy.add(core);

    } else {
      // 小型高速
      scale = 0.6;
      enemy.add(makeMesh(new THREE.SphereGeometry(0.32, 14, 14),
        { color: 0xff44cc, metalness: 0.7, roughness: 0.18, emissive: 0xffffff, emissiveIntensity: 0.7 }));
      enemy.add(createShadow(0.18, -0.33));
      y = -2 + Math.random() * 14;
    }

    var x = clamp((Math.random() - 0.5) * 20, -STAGE_X, STAGE_X);
    enemy.position.set(x, y, -35 - Math.random() * 4);
    enemy.scale.setScalar(scale);
    enemy.userData = { type: type, speed: def.speed, extra: extra };
    scene.add(enemy);
    enemies.push(enemy);
  }

  // =========================================================
  //  ゲーム初期化
  // =========================================================
  function init() {
    // 状態リセット
    score = 0;
    isGameOver = false;
    gameTimeLeft = TIME_LIMIT;
    playerTargetX = 0;
    playerTargetY = 1.5;
    bullets = [];
    enemies = [];
    items = [];
    explosions = [];
    shockwaves = [];
    showResultAfterExplosion = false;

    document.getElementById('timer').textContent = gameTimeLeft;
    document.getElementById('score').textContent = '0';
    document.getElementById('gameover').style.display = 'none';
    document.getElementById('restartBtn').style.display = 'none';
    document.getElementById('restartBtn').onclick = function () { location.reload(); };

    // シーン
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05081a);

    // 星屑（輝度・色バリエーション）
    for (var si = 0; si < 900; si++) {
      var bright = Math.random();
      var sr = bright > 0.97 ? Math.random() * 0.18 + 0.12 : Math.random() * 0.07 + 0.025;
      var col = bright > 0.97 ? STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)] : 0xffffff;
      var star = new THREE.Mesh(
        new THREE.SphereGeometry(sr, 6, 6),
        new THREE.MeshBasicMaterial({ color: col })
      );
      star.position.set((Math.random() - 0.5) * 100, (Math.random() - 0.5) * 55, -Math.random() * 200 - 10);
      scene.add(star);
    }

    // ネビュラ
    for (var ni = 0; ni < 6; ni++) {
      var nb = new THREE.Mesh(
        new THREE.PlaneGeometry(90 + Math.random() * 80, 55 + Math.random() * 50),
        new THREE.MeshBasicMaterial({
          color: NEBULA_COLORS[ni % NEBULA_COLORS.length],
          transparent: true,
          opacity: 0.13 + Math.random() * 0.14,
          depthWrite: false,
          side: THREE.DoubleSide,
        })
      );
      nb.position.set((Math.random() - 0.5) * 40, (Math.random() - 0.5) * 25, -80 - Math.random() * 100);
      nb.rotation.z = Math.random() * Math.PI;
      scene.add(nb);
    }

    // カメラ
    camera = new THREE.PerspectiveCamera(70, width / height, 0.1, 2000);
    camera.position.set(0, 3, 13);
    camera.lookAt(0, 1.5, 0);

    // レンダラー
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    // Bloom ポストプロセス
    composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    composer.addPass(new UnrealBloomPass(new THREE.Vector2(width, height), 1.4, 0.5, 0.70));

    // ライト
    scene.add(new THREE.AmbientLight(0x99ccff, 0.7));
    var dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(5, 10, 10);
    scene.add(dir);

    // プレイヤー
    player = createPlayerModel();

    var engineFlame = makeMesh(
      new THREE.ConeGeometry(0.22, 1.1, 10),
      { color: 0x0088ff, emissive: 0x004cff, emissiveIntensity: 3.0, transparent: true, opacity: 0.85 }
    );
    engineFlame.position.set(0, 0, -1.85);
    engineFlame.rotation.x = Math.PI / 2;
    engineFlame.name = 'engineFlame';
    player.add(engineFlame);

    var engineGlow = makeMesh(
      new THREE.SphereGeometry(0.28, 8, 8),
      { color: 0x33aaff, emissive: 0x33aaff, emissiveIntensity: 2.5, transparent: true, opacity: 0.55 }
    );
    engineGlow.position.set(0, 0, -1.6);
    engineGlow.name = 'engineGlow';
    player.add(engineGlow);

    player.position.set(0, 1.5, 0);
    scene.add(player);

    // タイマー
    timerIntervalId = setInterval(function () {
      if (isGameOver) return;
      gameTimeLeft--;
      document.getElementById('timer').textContent = gameTimeLeft;
      if (gameTimeLeft <= 0) {
        isGameOver = true;
        showResult('TIME UP!');
        clearAllIntervals();
      }
    }, 1000);

    // アイテム出現（約7秒ごと）
    itemIntervalId = setInterval(function () {
      if (!isGameOver && Math.random() < 0.7) addItem();
    }, 7000);

    // 敵出現（約0.7秒ごと）
    enemyIntervalId = setInterval(function () {
      if (!isGameOver) addEnemy();
    }, 700);
    for (var i = 0; i < 4; i++) addEnemy();

    // 入力イベント
    setupInput();
  }

  // =========================================================
  //  入力
  // =========================================================
  function setupInput() {
    // キーボード
    window.addEventListener('keydown', function (e) {
      if (isGameOver) return;
      if (e.code === 'ArrowLeft')  playerTargetX = Math.max(-STAGE_X, playerTargetX - 1.2);
      if (e.code === 'ArrowRight') playerTargetX = Math.min(STAGE_X, playerTargetX + 1.2);
      if (e.code === 'ArrowUp')    playerTargetY = Math.min(STAGE_Y_MAX, playerTargetY + 0.8);
      if (e.code === 'ArrowDown')  playerTargetY = Math.max(STAGE_Y_MIN, playerTargetY - 0.8);
      if (e.code === 'Space') shoot();
    });

    // マウス
    var mouseDown = false, mouseStartX = null, mouseStartY = null;
    var mousePlayerStartX = null, mousePlayerStartY = null;

    window.addEventListener('mousedown', function (e) {
      if (isGameOver) return;
      mouseDown = true;
      mouseStartX = e.clientX;
      mouseStartY = e.clientY;
      mousePlayerStartX = playerTargetX;
      mousePlayerStartY = playerTargetY;
    });

    window.addEventListener('mousemove', function (e) {
      if (isGameOver || !mouseDown || mouseStartX === null) return;
      var dx = (e.clientX - mouseStartX) / window.innerWidth * 40;
      var dy = -(e.clientY - mouseStartY) / window.innerHeight * 16;
      playerTargetX = clamp(mousePlayerStartX + dx, -STAGE_X, STAGE_X);
      playerTargetY = clamp(mousePlayerStartY + dy, STAGE_Y_MIN, STAGE_Y_MAX);
    });

    window.addEventListener('mouseup', function () { mouseDown = false; });

    window.addEventListener('click', function (e) {
      if (isGameOver) return;
      if (e.target === document.body || e.target === renderer.domElement) shoot();
    });

    // タッチ
    var touchStartX = null, touchStartY = null;
    var touchPlayerStartX = null, touchPlayerStartY = null;

    window.addEventListener('touchstart', function (e) {
      if (isGameOver || e.touches.length !== 1) return;
      var t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
      touchPlayerStartX = playerTargetX;
      touchPlayerStartY = playerTargetY;
    });

    window.addEventListener('touchmove', function (e) {
      if (isGameOver || e.touches.length !== 1 || touchStartX === null) return;
      var t = e.touches[0];
      var dx = (t.clientX - touchStartX) / window.innerWidth * 100;
      var dy = -(t.clientY - touchStartY) / window.innerHeight * 40;
      playerTargetX = clamp(touchPlayerStartX + dx, -STAGE_X, STAGE_X);
      playerTargetY = clamp(touchPlayerStartY + dy, STAGE_Y_MIN, STAGE_Y_MAX);
    });

    window.addEventListener('touchend', function (e) {
      if (isGameOver) return;
      if (e.changedTouches.length === 1 && touchStartX !== null) {
        var t = e.changedTouches[0];
        if (Math.abs(t.clientX - touchStartX) < 15 && Math.abs(t.clientY - touchStartY) < 15) {
          shoot();
        }
      }
      touchStartX = null;
      touchStartY = null;
    });
  }

  // =========================================================
  //  ショット
  // =========================================================
  function shoot() {
    var bullet = makeMesh(
      new THREE.SphereGeometry(0.32, 18, 18),
      { color: 0xffff33, emissive: 0xffff99, emissiveIntensity: 2.5, transparent: true, opacity: 0.92 }
    );
    bullet.position.copy(player.position);

    var trail = makeMesh(
      new THREE.CylinderGeometry(0.14, 0.22, 1.5, 12),
      { color: 0xffff99, emissive: 0xffff33, emissiveIntensity: 1.8, transparent: true, opacity: 0.65 }
    );
    trail.position.set(0, 0, -0.6);
    trail.rotation.x = Math.PI / 2;
    bullet.add(trail);

    scene.add(bullet);
    bullets.push(bullet);
  }

  // =========================================================
  //  メインループ
  // =========================================================
  function animate() {
    var prevTime = animate.prevTime || performance.now();
    var now = performance.now();
    var delta = Math.min((now - prevTime) * 0.001, 0.05);
    animate.prevTime = now;

    requestAnimationFrame(animate);

    if (!isGameOver) {
      updatePlayer();
      updateBullets(delta);
      updateEnemies(delta);
      updateItems(delta);
    }

    updateExplosions(delta);
    updateShockwaves(delta);
    stopBgmOnGameOver();

    composer.render();
  }

  // --- プレイヤー更新 ---
  function updatePlayer() {
    if (!player) return;
    player.position.x = playerTargetX;
    player.position.y = playerTargetY;

    // エンジン炎パルス
    var fl = player.getObjectByName('engineFlame');
    if (fl) {
      var pulse = 0.85 + 0.3 * Math.sin(performance.now() * 0.015);
      fl.scale.set(pulse, 1.15 + pulse * 0.3, pulse);
      fl.material.emissiveIntensity = 2.5 + pulse;
    }
    var gl = player.getObjectByName('engineGlow');
    if (gl) {
      gl.scale.setScalar(0.7 + 0.4 * Math.sin(performance.now() * 0.018 + 1.5));
    }

    // タイムアップ即時チェック
    if (gameTimeLeft <= 0) {
      isGameOver = true;
      showResult('TIME UP!');
    }
  }

  // --- 弾更新 ---
  function updateBullets(delta) {
    for (var i = bullets.length - 1; i >= 0; i--) {
      bullets[i].position.z -= 35 * delta;
      if (bullets[i].position.z < -40) {
        scene.remove(bullets[i]);
        bullets.splice(i, 1);
      }
    }
  }

  // --- 敵更新 ---
  function updateEnemies(delta) {
    for (var i = enemies.length - 1; i >= 0; i--) {
      var e = enemies[i];
      var def = ENEMY_DEFS[e.userData.type];

      e.position.z += e.userData.speed * delta;
      if (e.userData.extra === 'spin') e.rotation.y += 2.5 * delta;

      // 弾との衝突
      var hit = false;
      for (var j = bullets.length - 1; j >= 0; j--) {
        if (e.position.distanceTo(bullets[j].position) < def.hitDist) {
          createExplosion(e.position, 18, false);
          createShockwave(e.position);
          scene.remove(e);
          enemies.splice(i, 1);
          scene.remove(bullets[j]);
          bullets.splice(j, 1);
          score += def.score;
          document.getElementById('score').textContent = score;
          hit = true;
          break;
        }
      }
      if (hit) continue;

      // プレイヤーとの衝突
      if (player && e.position.distanceTo(player.position) < def.playerDist) {
        isGameOver = true;
        createExplosion(player.position, 18, true);
        scene.remove(player);
        showResultAfterExplosion = true;
        clearAllIntervals();
      }

      // 画面外削除
      if (e.position.z > 10) {
        scene.remove(e);
        enemies.splice(i, 1);
      }
    }
  }

  // --- アイテム更新 ---
  function updateItems(delta) {
    for (var i = items.length - 1; i >= 0; i--) {
      var item = items[i];

      item.position.z += 7 * delta;
      item.position.y += Math.sin(performance.now() * 0.002 + item.position.x) * 0.012;
      item.rotation.y += 1.5 * delta;
      item.rotation.x += 0.7 * delta;

      // BOMB アイテムの特殊回転
      if (item.userData.ring && item.userData.star) {
        item.userData.ring.rotation.z += 2.5 * delta;
        item.userData.star.rotation.z += 0.7 * delta;
      }

      // 画面外削除
      if (item.position.z > 10) {
        scene.remove(item);
        items.splice(i, 1);
        continue;
      }

      // プレイヤー取得判定
      if (player && item.position.distanceTo(player.position) < 1.1) {
        if (item.userData.type === ITEM_TYPE.BOMB) {
          // 全敵爆破
          for (var k = enemies.length - 1; k >= 0; k--) {
            var eDef = ENEMY_DEFS[enemies[k].userData.type];
            createExplosion(enemies[k].position, 12, false);
            score += eDef.score;
            document.getElementById('score').textContent = score;
            scene.remove(enemies[k]);
          }
          enemies.length = 0;
        }

        if (item.userData.type === ITEM_TYPE.TIME) {
          gameTimeLeft = Math.min(gameTimeLeft + 10, TIME_MAX);
          document.getElementById('timer').textContent = gameTimeLeft;
          var eff = makeMesh(
            new THREE.SphereGeometry(0.7, 18, 18),
            { color: 0x00ffff, emissive: 0xffff99, emissiveIntensity: 1.2, transparent: true, opacity: 0.7 }
          );
          eff.position.copy(player.position);
          scene.add(eff);
          setTimeout(function () { scene.remove(eff); }, 350);
        }

        scene.remove(item);
        items.splice(i, 1);
      }
    }
  }

  // --- 爆発更新 ---
  function updateExplosions(delta) {
    for (var k = explosions.length - 1; k >= 0; k--) {
      var exp = explosions[k];
      exp.time += delta;

      for (var m = 0; m < exp.particles.length; m++) {
        var mesh = exp.particles[m];
        mesh.position.addScaledVector(mesh.userData.velocity, delta * 2.5);
        mesh.material.opacity = Math.max(0, mesh.material.opacity - delta * 0.8);
      }

      if (exp.time > exp.maxTime) {
        scene.remove(exp.group);
        if (exp.isPlayerExplosion && showResultAfterExplosion) {
          showResult('GAME OVER');
          showResultAfterExplosion = false;
        }
        explosions.splice(k, 1);
      }
    }
  }

  // --- シュックウェーブ更新 ---
  function updateShockwaves(delta) {
    for (var k = shockwaves.length - 1; k >= 0; k--) {
      var sw = shockwaves[k];
      sw.time += delta;
      var progress = Math.min(sw.time / 0.35, 1);
      var s = 1 + progress * 16;
      sw.mesh.scale.set(s, s, s);
      sw.mesh.material.opacity = 0.88 * (1 - progress);
      if (sw.time >= 0.35) {
        scene.remove(sw.mesh);
        shockwaves.splice(k, 1);
      }
    }
  }

  // --- BGM制御 ---
  function stopBgmOnGameOver() {
    if (!isGameOver) return;
    var playBgm = document.getElementById('playBgm');
    if (playBgm && !playBgm.paused) {
      playBgm.pause();
      playBgm.currentTime = 0;
    }
  }

  // =========================================================
  //  リサイズ
  // =========================================================
  function handleResize() {
    width = window.innerWidth;
    height = getViewportHeight();
    if (!camera || !renderer) return;
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
    renderer.setSize(width, height);
    if (composer) composer.setSize(width, height);
  }

  window.addEventListener('resize', handleResize);
  window.addEventListener('orientationchange', handleResize);

  // =========================================================
  //  エントリーポイント
  // =========================================================
  showStartScreen();

  document.getElementById('startBtn').onclick = function () {
    var startBgm = document.getElementById('startBgm');
    if (startBgm) { startBgm.pause(); startBgm.currentTime = 0; }
    hideStartScreen();
    startGame();
  };
  </script>

  <script>
    // iOS長押し対策
    document.addEventListener('DOMContentLoaded', function () {
      var ignoreSelectors = ['#startBtn', '#restartBtn', '#startScreen button'];

      document.body.addEventListener('touchstart', function (e) {
        for (var i = 0; i < ignoreSelectors.length; i++) {
          if (e.target.closest(ignoreSelectors[i])) return;
        }
        if (e.touches.length === 1) e.preventDefault();
      }, { passive: false });

      document.body.addEventListener('gesturestart', function (e) { e.preventDefault(); });
      document.body.addEventListener('contextmenu', function (e) { e.preventDefault(); });
    });
  </script>
</body>
